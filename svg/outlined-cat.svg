<svg id="cat-svg-outlined" class="cat-sprite" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Shadow -->
  <ellipse cx="15.5" cy="27" rx="8" ry="1" fill="rgba(0,0,0,0.15)" />

  <!-- Steam Puffs (Overheat Mode) -->
  <g class="steam-puffs" opacity="0">
    <rect class="steam-1" x="11" y="2" width="2" height="2" fill="#fff" opacity="0.6" />
    <rect class="steam-2" x="18" y="1" width="2" height="2" fill="#fff" opacity="0.6" />
  </g>

  <!-- Thinking Dots -->
  <g class="thinking-dots" opacity="0" transform="translate(18, 4)">
    <rect x="0" y="2" width="1" height="1" fill="#fff" class="dot-1" />
    <rect x="2" y="2" width="1" height="1" fill="#fff" class="dot-2" />
    <rect x="4" y="2" width="1" height="1" fill="#fff" class="dot-3" />
  </g>

  <!-- Tail (Outlined, curved, with class tail-fur) -->
  <g class="cat-tail" transform-origin="20 22">
    <!-- Outline -->
    <rect x="20" y="17" width="3" height="5" fill="#111" />
    <rect x="22" y="14" width="3" height="4" fill="#111" />
    <!-- Fill -->
    <rect class="tail-fur" x="21" y="18" width="1" height="3" fill="var(--fur-primary)" />
    <rect class="tail-fur" x="23" y="15" width="1" height="2" fill="var(--fur-primary)" />
    <!-- Tip -->
    <rect x="23" y="14" width="1" height="1" fill="var(--fur-secondary)" />
  </g>

  <!-- Body (Outlined, symmetrical) -->
  <g class="cat-body" transform-origin="15 26">
    <!-- Torso Outline -->
    <rect x="11" y="17" width="10" height="9" fill="#111" />
    <!-- Torso Fill (Default primary) -->
    <rect x="12" y="18" width="8" height="7" fill="var(--fur-primary)" />
    
    <!-- Chest Bib (Secondary color, e.g. white/cream) -->
    <rect x="14" y="18" width="4" height="2" fill="var(--fur-secondary)" />
    <rect x="15" y="20" width="2" height="1" fill="var(--fur-secondary)" />
  </g>

  <!-- Paws (Vertical outlined legs) -->
  <g class="cat-paws">
    <!-- Left Paw / Leg -->
    <g class="cat-paw-left" transform-origin="13 26">
      <!-- Outline -->
      <rect x="12" y="20" width="3" height="7" fill="#111" />
      <!-- Fill -->
      <rect class="left-paw-fur" x="13" y="21" width="1" height="4" fill="var(--fur-primary)" />
      <!-- White paw tip -->
      <rect x="13" y="25" width="1" height="1" fill="var(--fur-secondary)" />
    </g>
    <!-- Right Paw / Leg -->
    <g class="cat-paw-right" transform-origin="18 26">
      <!-- Outline -->
      <rect x="17" y="20" width="3" height="7" fill="#111" />
      <!-- Fill -->
      <rect class="right-paw-fur" x="18" y="21" width="1" height="4" fill="var(--fur-primary)" />
      <!-- White paw tip -->
      <rect x="18" y="25" width="1" height="1" fill="var(--fur-secondary)" />
    </g>
  </g>

  <!-- Head Group -->
  <g class="cat-head" transform-origin="15 16">
    <!-- Head Outline -->
    <rect x="9" y="10" width="14" height="7" fill="#111" />
    <!-- Head Fill -->
    <rect x="10" y="11" width="12" height="5" fill="var(--fur-primary)" />
    
    <!-- Whiskers (Left) -->
    <rect x="7" y="12" width="2" height="1" fill="#111" />
    <rect x="6" y="13" width="3" height="1" fill="#111" />
    <rect x="7" y="14" width="2" height="1" fill="#111" />
    <!-- Whiskers (Right) -->
    <rect x="23" y="12" width="2" height="1" fill="#111" />
    <rect x="23" y="13" width="3" height="1" fill="#111" />
    <rect x="23" y="14" width="2" height="1" fill="#111" />

    <!-- Ears (Pointy mirrored ears) -->
    <!-- Pointy Left Ear -->
    <g class="cat-ear-left">
      <rect x="11" y="6" width="1" height="1" fill="#111" />
      <rect x="10" y="7" width="3" height="1" fill="#111" />
      <rect x="9" y="8" width="5" height="1" fill="#111" />
      <rect x="9" y="9" width="5" height="1" fill="#111" />
      <!-- Inner Pink / Fill -->
      <rect class="left-ear-fur" x="11" y="8" width="2" height="2" fill="var(--fur-primary)" />
      <rect class="left-ear-fur" x="10" y="9" width="3" height="1" fill="var(--fur-primary)" />
      <rect x="11" y="7" width="1" height="1" fill="var(--ear-inner)" />
      <rect x="11" y="8" width="2" height="1" fill="var(--ear-inner)" />
      <rect x="10" y="9" width="2" height="1" fill="var(--ear-inner)" />
    </g>
    <!-- Pointy Right Ear -->
    <g class="cat-ear-right">
      <rect x="20" y="6" width="1" height="1" fill="#111" />
      <rect x="19" y="7" width="3" height="1" fill="#111" />
      <rect x="18" y="8" width="5" height="1" fill="#111" />
      <rect x="18" y="9" width="5" height="1" fill="#111" />
      <!-- Inner Pink / Fill -->
      <rect class="right-ear-fur" x="19" y="8" width="2" height="2" fill="var(--fur-primary)" />
      <rect class="right-ear-fur" x="19" y="9" width="3" height="1" fill="var(--fur-primary)" />
      <rect x="20" y="7" width="1" height="1" fill="var(--ear-inner)" />
      <rect x="19" y="8" width="2" height="1" fill="var(--ear-inner)" />
      <rect x="20" y="9" width="2" height="1" fill="var(--ear-inner)" />
    </g>

    <!-- Snout Markings & Mask Layers -->
    <!-- White Snout Patch (Inverted T) -->
    <g class="white-muzzle">
      <rect x="15" y="11" width="2" height="3" fill="#fff" />
      <rect x="14" y="14" width="4" height="2" fill="#fff" />
    </g>
    <!-- Siamese Dark Mask -->
    <g class="siamese-mask">
      <rect x="11" y="12" width="10" height="4" fill="var(--fur-pattern-color)" />
      <rect x="13" y="11" width="6" height="1" fill="var(--fur-pattern-color)" />
      <rect x="14" y="16" width="4" height="1" fill="var(--fur-pattern-color)" />
    </g>
    <!-- Calico Face Patches -->
    <g class="calico-patches">
      <rect x="10" y="11" width="4" height="5" fill="var(--fur-secondary)" />
      <rect x="18" y="11" width="4" height="5" fill="var(--fur-pattern-color)" />
      <!-- Left ear patch / right ear patch fill -->
      <rect x="10" y="8" width="3" height="2" fill="var(--fur-secondary)" />
      <rect x="19" y="8" width="3" height="2" fill="var(--fur-pattern-color)" />
      <rect x="11" y="7" width="1" height="1" fill="var(--fur-secondary)" />
      <rect x="20" y="7" width="1" height="1" fill="var(--fur-pattern-color)" />
      <!-- Inner Pink restoration (draw over patches) -->
      <rect x="11" y="7" width="1" height="1" fill="var(--ear-inner)" />
      <rect x="11" y="8" width="2" height="1" fill="var(--ear-inner)" />
      <rect x="10" y="9" width="2" height="1" fill="var(--ear-inner)" />
      <rect x="20" y="7" width="1" height="1" fill="var(--ear-inner)" />
      <rect x="19" y="8" width="2" height="1" fill="var(--ear-inner)" />
      <rect x="20" y="9" width="2" height="1" fill="var(--ear-inner)" />
    </g>

    <!-- Eyes (Outlined, 2x3 block) -->
    <g class="cat-eyes">
      <!-- Left Eye -->
      <g class="cat-eye-left">
        <rect class="pupil left-eye-color" x="12" y="12" width="2" height="3" fill="#111" />
        <rect x="12" y="12" width="1" height="1" fill="#fff" /> <!-- Highlight -->
      </g>
      <!-- Right Eye -->
      <g class="cat-eye-right">
        <rect class="pupil right-eye-color" x="18" y="12" width="2" height="3" fill="#111" />
        <rect x="19" y="12" width="1" height="1" fill="#fff" /> <!-- Highlight -->
      </g>
    </g>

    <!-- Snout (Center of face) -->
    <g class="cat-snout">
      <rect x="15" y="14" width="2" height="1" fill="#111" /> <!-- Nose -->
      <rect x="15" y="15" width="2" height="1" fill="#e27c7c" /> <!-- Pink tongue -->
    </g>
  </g>
</svg>
