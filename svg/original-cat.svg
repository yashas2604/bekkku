<svg id="cat-svg-original" class="cat-sprite" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- Shadow -->
  <ellipse cx="15" cy="27.5" rx="8" ry="1.5" fill="rgba(0,0,0,0.15)" />
  
  <!-- Steam Puffs (Overheat Mode) -->
  <g class="steam-puffs" opacity="0">
    <rect class="steam-1" x="11" y="2" width="2" height="2" fill="#fff" opacity="0.6" />
    <rect class="steam-2" x="18" y="1" width="2" height="2" fill="#fff" opacity="0.6" />
  </g>

  <!-- Thinking Dots -->
  <g class="thinking-dots" opacity="0" transform="translate(18, 4)">
    <rect x="0" y="2" width="1" height="1" fill="#fff" class="dot-1" />
    <rect x="2" y="2" width="1" height="1" fill="#fff" class="dot-2" />
    <rect x="4" y="2" width="1" height="1" fill="#fff" class="dot-3" />
  </g>

  <!-- Tail -->
  <g class="cat-tail" transform-origin="21 21">
    <rect x="19" y="15" width="2" height="7" fill="var(--fur-primary)" />
    <rect x="21" y="13" width="2" height="4" fill="var(--fur-primary)" />
    <rect x="23" y="11" width="2" height="3" fill="var(--fur-primary)" />
    <!-- Tip -->
    <rect x="23" y="11" width="2" height="1.5" fill="var(--fur-secondary)" />
    <!-- Shadow shading -->
    <rect x="19" y="16" width="2" height="6" fill="var(--fur-shadow)" opacity="0.25" />
  </g>

  <!-- Body -->
  <g class="cat-body" transform-origin="15 26">
    <!-- Main Torso -->
    <rect x="8" y="17" width="12" height="9" fill="var(--fur-primary)" />
    <!-- Chest Bib (Secondary color) -->
    <rect x="9" y="19" width="4" height="7" fill="var(--fur-secondary)" />
    
    <!-- Shading -->
    <rect x="8" y="25" width="12" height="1" fill="var(--fur-shadow)" opacity="0.25" />
    <rect x="19" y="17" width="1" height="8" fill="var(--fur-shadow)" opacity="0.25" />
    
    <!-- Patterns / Stripes (Orange Tabby, Calico) -->
    <g class="fur-pattern" opacity="0.4">
      <rect x="12" y="18" width="2" height="1" fill="var(--fur-pattern-color, #000)" />
      <rect x="15" y="20" width="3" height="1" fill="var(--fur-pattern-color, #000)" />
      <rect x="14" y="22" width="4" height="1" fill="var(--fur-pattern-color, #000)" />
    </g>
  </g>

  <!-- Paws -->
  <g class="cat-paws">
    <!-- Left Paw -->
    <g class="cat-paw-left" transform-origin="10 26">
      <rect x="9" y="25" width="3" height="2" fill="var(--fur-primary)" />
      <rect x="9" y="26" width="3" height="1" fill="var(--fur-secondary)" />
    </g>
    <!-- Right Paw -->
    <g class="cat-paw-right" transform-origin="15 26">
      <rect x="14" y="25" width="3" height="2" fill="var(--fur-primary)" />
      <rect x="14" y="26" width="3" height="1" fill="var(--fur-secondary)" />
    </g>
  </g>

  <!-- Head Group -->
  <g class="cat-head" transform-origin="13 16">
    <!-- Ears -->
    <g class="cat-ear-left">
      <rect x="6" y="7" width="3" height="4" fill="var(--fur-primary)" />
      <rect x="7" y="8" width="1" height="2" fill="var(--ear-inner)" />
    </g>
    <g class="cat-ear-right">
      <rect x="15" y="7" width="3" height="4" fill="var(--fur-primary)" />
      <rect x="16" y="8" width="1" height="2" fill="var(--ear-inner)" />
    </g>

    <!-- Head Base -->
    <rect x="5" y="10" width="14" height="7" fill="var(--fur-primary)" />
    <!-- Head Shadow -->
    <rect x="5" y="16" width="14" height="1" fill="var(--fur-shadow)" opacity="0.25" />
    
    <!-- Face Markings / Patches (Siamese / Calico) -->
    <g class="face-pattern" opacity="0.3">
      <rect x="10" y="12" width="4" height="5" fill="var(--fur-pattern-color, #000)" />
    </g>

    <!-- Eyes -->
    <g class="cat-eyes">
      <!-- Left Eye -->
      <g class="cat-eye-left">
        <rect class="eye-white" x="7" y="11" width="2" height="3" fill="#fff" />
        <rect class="pupil" x="7" y="12" width="1" height="2" fill="var(--eye-color)" />
      </g>
      <!-- Right Eye -->
      <g class="cat-eye-right">
        <rect class="eye-white" x="15" y="11" width="2" height="3" fill="#fff" />
        <rect class="pupil" x="16" y="12" width="1" height="2" fill="var(--eye-color)" />
      </g>
    </g>

    <!-- Snout -->
    <g class="cat-snout">
      <rect x="10" y="14" width="4" height="2" fill="var(--fur-secondary)" />
      <rect x="11" y="14" width="2" height="1" fill="#1b1212" /> <!-- Nose -->
      <rect x="11" y="15" width="2" height="1" fill="#e27c7c" opacity="0.5" /> <!-- Mouth -->
    </g>

    <!-- Whiskers -->
    <g class="whiskers" opacity="0.4">
      <rect x="2" y="14" width="3" height="1" fill="#fff" />
      <rect x="19" y="14" width="3" height="1" fill="#fff" />
    </g>
  </g>
</svg>
